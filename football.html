<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live Football</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

.container {
  display: flex;
  flex-direction: column;
  gap: 15px;
  padding: 20px;
  max-width: 800px;
  margin: auto;
}

.card {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 0 15px rgba(0,0,0,0.3);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.02);
  background: rgba(255,255,255,0.12);
}

.team {
  font-size: 20px;
  font-weight: bold;
}

.score {
  font-size: 18px;
  margin-top: 5px;
  color: #38bdf8;
}

.minute {
  margin-top: 5px;
  font-size: 14px;
  opacity: 0.7;
}
</style>
</head>

<body>

<header>⚽ Live Football Matches</header>

<div class="container" id="matches"></div>

<script>
async function loadMatches() {
  try {
    const res = await fetch("/api");
    const data = await res.json();

    const container = document.getElementById("matches");
    container.innerHTML = "";

    if (!data.matches || data.matches.length === 0) {
      container.innerHTML = "<p>No live matches right now</p>";
      return;
    }

    data.matches.forEach(match => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="team">${match.home} vs ${match.away}</div>
        <div class="score">${match.homeGoals} - ${match.awayGoals}</div>
        <div class="minute">Minute: ${match.minute}</div>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.log(err);
  }
}

loadMatches();
setInterval(loadMatches, 10000);
</script>

</body>
</html>
