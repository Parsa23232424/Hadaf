
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ماشین‌بازی</title>

<style>
body{
    background:#222;
    color:white;
    text-align:center;
    font-family:tahoma;
    margin:0;
}

canvas{
    background:#2a2a2a;
    border:3px solid white;
    margin-top:10px;
}

button{
    font-size:24px;
    padding:10px 20px;
    margin:5px;
}

#gameOver{
    display:none;
    font-size:40px;
    color:red;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>🚗 ماشین‌بازی</h1>

<div>
🏆 امتیاز:
<span id="score">0</span>
</div>

<div id="gameOver">
💥 GAME OVER 💥
</div>

<canvas id="game" width="400" height="600"></canvas>

<br>

<button onclick="moveLeft()">⬅️</button>
<button onclick="moveRight()">➡️</button>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let score = 0;
let gameRunning = true;

let car = {
    x:170,
    y:500,
    width:60,
    height:100
};

let enemy = {
    x:100 + Math.random()*140,
    y:-100,
    width:60,
    height:100
};

let roadOffset = 0;

document.addEventListener("keydown",(e)=>{
    if(e.key==="ArrowLeft") moveLeft();
    if(e.key==="ArrowRight") moveRight();
});

function moveLeft(){
    if(car.x > 105){
        car.x -= 20;
    }
}

function moveRight(){
    if(car.x < 235){
        car.x += 20;
    }
}

function collision(a,b){
    return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
    );
}

setInterval(()=>{
    if(gameRunning){
        score++;
        document.getElementById("score").innerText = score;
    }
},1000);

function draw(){

    if(!gameRunning) return;

    ctx.clearRect(0,0,400,600);

    // چمن
    ctx.fillStyle="green";
    ctx.fillRect(0,0,100,600);
    ctx.fillRect(300,0,100,600);

    // جاده
    ctx.fillStyle="#555";
    ctx.fillRect(100,0,200,600);

    // خط وسط
    ctx.fillStyle="white";

    for(let y=-40;y<600;y+=80){
        ctx.fillRect(195,y+roadOffset,10,40);
    }

    roadOffset += 6;

    if(roadOffset >= 80){
        roadOffset = 0;
    }

    // ماشین بازیکن
    ctx.fillStyle="red";
    ctx.fillRect(car.x,car.y,car.width,car.height);

    // ماشین دشمن
    ctx.fillStyle="blue";
    ctx.fillRect(enemy.x,enemy.y,enemy.width,enemy.height);

    enemy.y += 7;

    if(enemy.y > 650){
        enemy.y = -100;
        enemy.x = 100 + Math.random()*140;
    }

    // برخورد
    if(collision(car,enemy)){
        gameRunning = false;
        document.getElementById("gameOver").style.display="block";
        return;
    }

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
