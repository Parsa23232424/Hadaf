<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>آپلود خبر</title>

<style>
body { font-family: sans-serif; background:#f2f2f2; padding:20px; }
input, textarea { width:100%; margin:10px 0; padding:10px; }
button { padding:10px; background:black; color:white; border:none; }
</style>
</head>

<body>

<h2>📤 آپلود خبر</h2>

<input id="title" placeholder="عنوان">
<textarea id="desc" placeholder="توضیحات"></textarea>
<input type="file" id="image">

<button onclick="upload()">ارسال</button>

<script>
async function upload() {
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;
  const file = document.getElementById("image").files[0];

  let imageData = "";

  if (file) {
    const reader = new FileReader();
    reader.readAsDataURL(file);

    reader.onload = async function () {
      imageData = reader.result;

      sendData(title, desc, imageData);
    };
  } else {
    sendData(title, desc, "");
  }
}

function sendData(title, desc, image) {

  fetch("YOUR_APPS_SCRIPT_URL", {
    method: "POST",
    body: JSON.stringify({ title, desc, image })
  })
  .then(res => res.text())
  .then(data => {
    alert("خبر ارسال شد!");
  });
}
</script>

</body>
</html>
