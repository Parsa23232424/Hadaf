<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>آپلود خبر</title>

<style>
body { font-family:sans-serif; padding:20px; background:#f2f2f2; }
input, textarea { width:100%; padding:10px; margin:10px 0; }
button { width:100%; padding:10px; background:black; color:white; border:none; }
</style>
</head>

<body>

<h2>📤 آپلود خبر</h2>

<input id="title" placeholder="عنوان">
<textarea id="desc" placeholder="توضیحات"></textarea>
<input type="file" id="image">
<button onclick="upload()">ارسال</button>


<script>
const API = "https://script.google.com/macros/s/AKfycbw5kO0QPb0rkCLfh2rgzCZM_dnyc57WZG-yAJOipnJ4MmRSgt2jnK7Be6WnbExCrxB1lQ/exec";

function upload() {

  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;
  const file = document.getElementById("image").files[0];

  const sendData = (img) => {
    fetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        title,
        desc,
        image: img || ""
      })
    })
    .then(res => res.text())
    .then(data => {
      console.log(data);
      alert("خبر ثبت شد!");
    })
    .catch(err => {
      console.log(err);
      alert("خطا در ارسال ❌");
    });
  };

  if (file) {
    const reader = new FileReader();
    reader.onload = () => sendData(reader.result);
    reader.readAsDataURL(file);
  } else {
    sendData("");
  }
}
</script>
