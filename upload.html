<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>آپلود خبر</title>

<style>
body { font-family:sans-serif; padding:20px; background:#f2f2f2; }
input, textarea { width:100%; padding:10px; margin:10px 0; }
button { width:100%; padding:10px; background:black; color:white; border:none; }
</style>
</head>

<body>

<h2>📤 آپلود خبر</h2>

<input id="title" placeholder="عنوان">
<textarea id="desc" placeholder="توضیحات"></textarea>
<input type="file" id="image">

<button onclick="upload()">ارسال</button>

<script>
const API = "https://script.google.com/macros/s/AKfycbwEF4ywacnChYT_fyCw3mQCzHvQhOFEBJs-vd2z9TTqSXG_RgDoQxy_vsPza-20baHc/exec";

function upload() {

  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;
  const file = document.getElementById("image").files[0];

  const reader = new FileReader();

  reader.onload = function () {

    fetch(API, {
      method: "POST",
      body: JSON.stringify({
        title,
        desc,
        image: file ? reader.result : ""
      })
    }).then(() => alert("خبر ثبت شد"));

  };

  if (file) reader.readAsDataURL(file);
  else reader.onload();
}
</script>

</body>
</html>
