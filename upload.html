<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آپلود خبر</title>

<style>
body{
  font-family:sans-serif;
  background:#f2f2f2;
  padding:20px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
}

button{
  width:100%;
  padding:12px;
  background:black;
  color:white;
  border:none;
}
</style>
</head>

<body>

<h2>📤 آپلود خبر</h2>

<input id="title" placeholder="عنوان">
<textarea id="desc" placeholder="توضیحات"></textarea>
<input type="file" id="image">

<button id="sendBtn">ارسال</button>

<script>
const API = "https://script.google.com/macros/s/AKfycbzA97rZ33__TQLxg9AfXex6cHPq-N-3yTMvaejfT9Rj_mTSV7hRhrs3tdDeAQhtjwf-tw/exec";

document.getElementById("sendBtn").addEventListener("click", upload);

function upload() {

  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;
  const file = document.getElementById("image").files[0];

  const send = (img) => {

    fetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify({
        title,
        desc,
        image: img || ""
      })
    })
    .then(r => r.text())
    .then(r => {
      alert("خبر ثبت شد ✔");
    })
    .catch(() => {
      alert("خطا در ارسال ❌");
    });

  };

  if (file) {
    const reader = new FileReader();
    reader.onload = () => send(reader.result);
    reader.readAsDataURL(file);
  } else {
    send("");
  }
}
</script>

</body>
</html>
