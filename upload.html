<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آپلود خبر</title>

<style>
body{
  font-family:sans-serif;
  background:#f2f2f2;
  padding:20px;
}

h2{
  text-align:center;
}

input, textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:black;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<h2>📤 آپلود خبر</h2>

<input id="title" placeholder="عنوان">
<textarea id="desc" placeholder="توضیحات"></textarea>
<input type="file" id="image">

<button onclick="upload()">ارسال</button>

<script>
const API = "https://script.google.com/macros/s/AKfycbzA97rZ33__TQLxg9AfXex6cHPq-N-3yTMvaejfT9Rj_mTSV7hRhrs3tdDeAQhtjwf-tw/exec";

function upload() {

  const title = document.getElementById("title").value.trim();
  const desc = document.getElementById("desc").value.trim();
  const fileInput = document.getElementById("image");
  const file = fileInput.files[0];

  if (!title && !desc && !file) {
    alert("لطفاً چیزی وارد کن");
    return;
  }

  const send = (imageData) => {

    fetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify({
        title: title,
        desc: desc,
        image: imageData || ""
      })
    })
    .then(res => res.text())
    .then(res => {
      if (res.includes("ERROR")) {
        alert("خطا در سرور ❌");
      }
