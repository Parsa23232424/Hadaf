<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آپلود خبر</title>

<style>
body{
  font-family:sans-serif;
  background:#f2f2f2;
  padding:20px;
}

h2{
  text-align:center;
}

input, textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:black;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<h2>📤 آپلود خبر</h2>

<input id="title" placeholder="عنوان">
<textarea id="desc" placeholder="توضیحات"></textarea>
<input type="file" id="image">

<button onclick="upload()">ارسال</button>

<script>
const API = "https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnQiphSaiZwSQV9AHM6IuB_LtbKi5NVLvLamwhcyNpMzkEpNcH8IHWYHsHn7FzKWTypRjV8j_jMtWz6Lq_AcCypfK2ZQ8LVZ5e65pt80SlKEl4bu3fZt9RthKrU4q7CIhxh-3wDGFZEEXmRCUAV6S4KOEdLX8teo4IsMCbm0hsA2pV8evzSzX0UGHkZgsLlnYxVglAIG_eM9H_hZ-9vbXiWOlCdiGVOlKok0AIaYA7AqhrW7fLZiHYv1QH-mawFDrqutTKMFPY7HImBL1ApJQMYmuErPoQ&lib=MMpfL_QYt-Eruxoopyt9t-j8gKJ1jhRyL";

function upload() {

  const title = document.getElementById("title").value.trim();
  const desc = document.getElementById("desc").value.trim();
  const file = document.getElementById("image").files[0];

  if (!title && !desc && !file) {
    alert("لطفاً چیزی وارد کن");
    return;
  }

  const sendData = (imageData) => {

    const data = {
      title: title,
      desc: desc,
      image: imageData || ""
    };

    fetch(API, {
      method: "POST",
      mode: "no-cors",   // مهم برای مشکل CORS
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    alert("درخواست ارسال شد ✔");

    // پاک کردن فرم
    document.getElementById("title").value = "";
    document.getElementById("desc").value = "";
    document.getElementById("image").value = "";

  };

  if (file) {
    const reader = new FileReader();
    reader.onload = () => sendData(reader.result);
    reader.readAsDataURL(file);
  } else {
    sendData("");
  }
}
</script>

</body>
</html>
