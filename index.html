<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بازی شکار هدف 🏹</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="game-container">
    <div id="ui">
        امتیاز: <span id="score">0</span> | زمان: <span id="time">20</span> ثانیه
    </div>

    <div id="target">🎯</div>

    <button id="start-btn" onclick="startGame()">▶️</button>
</div>

<h2>🧠 اخبار تکنولوژی</h2>
<div id="news"></div>

<script>
async function loadNews() {

  const url = "https://docs.google.com/spreadsheets/d/1kFAxBtSGbAEcJKumSnYhR2YG4_1RMqQBompriUQ7NwU/gviz/tq?tqx=out:csv&gid=0";

  const res = await fetch(url);
  const text = await res.text();

  const rows = text.split("\n");

  let html = "";

  for (let i = 1; i < rows.length; i++) {

    const cols = rows[i].split(",");

    const title = cols[0];
    const desc = cols[1];

    if (title && title !== "title") {
      html += `
        <div style="border:1px solid #ccc;padding:10px;margin:10px;">
          <h3>${title}</h3>
          <p>${desc}</p>
        </div>
      `;
    }
  }

  document.getElementById("news").innerHTML = html;
}

loadNews();
</script>

<script src="game.js"></script>

</body>
</html>
