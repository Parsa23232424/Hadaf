<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hadaf News 🧠</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f2f2f2;
    }

    .header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 18px;
      position: sticky;
      top: 0;
    }

    #news {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #ddd;
    }

    .content {
      padding: 10px;
    }

    .title {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .desc {
      color: #555;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="header">🧠 Hadaf Tech News</div>

<div id="news"></div>

<script>
async function loadNews() {

  const url = "https://script.google.com/macros/s/AKfycbwsN8_iEVf3ti3_9AufI5Vg3-QyG3TvVBXOWIgsuKoU-JNf7_0MVn02AKSbNMZsp63RYw/exec";

  const res = await fetch(url);
  const data = await res.json();

  let html = "";

  data.forEach(n => {
    html += `
      <div class="card">
        <img src="https://via.placeholder.com/400x200" alt="news">
        <div class="content">
          <div class="title">${n.title}</div>
          <div class="desc">${n.desc || ""}</div>
        </div>
      </div>
    `;
  });

  document.getElementById("news").innerHTML = html;
}

loadNews();
</script>

</body>
</html>
