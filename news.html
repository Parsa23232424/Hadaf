<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hadaf Tech 🧠 News 🎯</title>
<link rel="icon" href="logo.ico">

<style>
body{
    margin:0;
    background:#f2f2f2;
    font-family:tahoma,sans-serif;
}

.header{
    background:#111;
    color:white;
    text-align:center;
    padding:15px;
    font-size:24px;
    font-weight:bold;
}

#news{
    max-width:900px;
    margin:auto;
}

.card{
    background:white;
    margin:15px;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    display:block;
}

.content{
    padding:15px;
}

.content h2{
    margin:0 0 10px 0;
}

.content p{
    line-height:1.8;
}

.error{
    text-align:center;
    color:red;
    margin:20px;
}
</style>
</head>
<body>

<div class="header">🧠 Hadaf Tech News 🎯</div>

<div id="news"></div>

<script>
fetch("data.json")
.then(response => response.json())
.then(data => {

    let html = "";

    data.forEach(news => {

        if (!news.title && !news.text && !news.image) return;

        html += `
        <div class="card">
            <img src="${news.image || 'image1.jpg'}" alt="">
            <div class="content">
                <h2>${news.title || ''}</h2>
                <p>${news.text || ''}</p>
            </div>
        </div>
        `;
    });

    document.getElementById("news").innerHTML = html;
})
.catch(error => {
    document.getElementById("news").innerHTML =
        '<div class="error">❌ خطا در بارگذاری اخبار</div>';
    console.error(error);
});
</script>

</body>
</html>
