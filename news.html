<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title> Hadaf Tech 🧠 News 🎯</title>

<style>
body { margin:0; font-family:sans-serif; background:#f2f2f2; }
.header { background:#111; color:white; padding:15px; text-align:center; }
.card { background:white; margin:10px; border-radius:10px; overflow:hidden; }
.card img { width:100%; height:200px; object-fit:cover; }
.content { padding:10px; }
</style>
</head>

<body>

<div class="header">🧠 News</div>
<div id="news">Loading...</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwEF4ywacnChYT_fyCw3mQCzHvQhOFEBJs-vd2z9TTqSXG_RgDoQxy_vsPza-20baHc/exec";

async function load() {

  const res = await fetch(API);
  const data = await res.json();

  let html = "";

  data.forEach(n => {
    html += `
      <div class="card">
        <img src="${n.image || 'https://via.placeholder.com/400x200'}">
        <div class="content">
          <b>${n.title}</b>
          <p>${n.desc || ""}</p>
        </div>
      </div>
    `;
  });

  document.getElementById("news").innerHTML = html;
}

load();
</script>

</body>
</html>
